<!-- @dsCard group="Colors" viewport="700x150" name="Operational surfaces" subtitle="Canvas, sidebar, panels & dark table chrome" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); }
  .row { display: flex; gap: 12px; padding: 20px; }
  .sw { flex: 1; border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--border-subtle); }
  .chip { height: 60px; }
  .meta { padding: 7px 10px; }
  .name { font-size: 11px; font-weight: 600; color: var(--text-strong); }
  .hex { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 2px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--color-white)"></div><div class="meta"><div class="name">Canvas</div><div class="hex">#FFFFFF</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-gray-50)"></div><div class="meta"><div class="name">App</div><div class="hex">#FAFAFA</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-gray-75)"></div><div class="meta"><div class="name">Sidebar</div><div class="hex">#F8F8F8</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-gray-100)"></div><div class="meta"><div class="name">Panel / zebra</div><div class="hex">#F7F7F7</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-gray-150)"></div><div class="meta"><div class="name">Row hover</div><div class="hex">#ECECEC</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--color-ink-700)"></div><div class="meta"><div class="name">Table header</div><div class="hex">#393939</div></div></div>
  </div>
</body>
</html>
