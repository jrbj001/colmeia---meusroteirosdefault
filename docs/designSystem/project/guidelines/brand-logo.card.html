<!-- @dsCard group="Brand" viewport="700x180" name="Logo" subtitle="Full lockup + hexagon mark · keep untouched" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); }
  .wrap { padding: 24px; display: flex; align-items: center; gap: 40px; }
  .lockup { display: flex; flex-direction: column; gap: 14px; }
  .full { height: 34px; width: auto; }
  .mark { height: 44px; width: auto; }
  .lab { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); font-weight: 600; }
  .onbrand { background: var(--color-orange-500); border-radius: var(--radius-lg); padding: 16px 20px; display: flex; align-items: center; }
  .sep { width: 1px; align-self: stretch; background: var(--border-subtle); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="lockup">
      <div class="lab">Primary lockup</div>
      <img class="full" src="../assets/logo-colmeia-full.png" alt="Colmeia" />
    </div>
    <div class="sep"></div>
    <div class="lockup">
      <div class="lab">Mark</div>
      <img class="mark" src="../assets/logo-colmeia-mark.png" alt="Colmeia mark" />
    </div>
    <div class="sep"></div>
    <div class="lockup">
      <div class="lab">On wash</div>
      <div class="onbrand"><img class="mark" style="height:36px" src="../assets/logo-colmeia-mark.png" alt="Colmeia mark" /></div>
    </div>
  </div>
</body>
</html>
