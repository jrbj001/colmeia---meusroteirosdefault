<!-- @dsCard group="Brand" viewport="700x170" name="Iconography — Material Symbols" subtitle="Outlined, 24px, currentColor" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); }
  .wrap { padding: 22px 24px; }
  .row { display: flex; flex-wrap: wrap; gap: 22px; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 7px; width: 76px; }
  .material-symbols-outlined { font-size: 26px; color: var(--text-body); }
  .nm { font-size: 9px; color: var(--text-secondary); font-family: var(--font-mono); text-align: center; }
  .accent .material-symbols-outlined { color: var(--color-orange-500); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="ic"><span class="material-symbols-outlined">pin_drop</span><span class="nm">pin_drop</span></div>
      <div class="ic"><span class="material-symbols-outlined">add_box</span><span class="nm">add_box</span></div>
      <div class="ic"><span class="material-symbols-outlined">find_in_page</span><span class="nm">find_in_page</span></div>
      <div class="ic"><span class="material-symbols-outlined">difference</span><span class="nm">difference</span></div>
      <div class="ic"><span class="material-symbols-outlined">search</span><span class="nm">search</span></div>
      <div class="ic"><span class="material-symbols-outlined">style</span><span class="nm">style</span></div>
      <div class="ic"><span class="material-symbols-outlined">delete</span><span class="nm">delete</span></div>
      <div class="ic"><span class="material-symbols-outlined">check_circle</span><span class="nm">check_circle</span></div>
      <div class="ic"><span class="material-symbols-outlined">logout</span><span class="nm">logout</span></div>
      <div class="ic accent"><span class="material-symbols-outlined">keyboard_arrow_down</span><span class="nm">arrow_down</span></div>
      <div class="ic accent"><span class="material-symbols-outlined">map</span><span class="nm">map</span></div>
      <div class="ic accent"><span class="material-symbols-outlined">settings</span><span class="nm">settings</span></div>
    </div>
  </div>
</body>
</html>
