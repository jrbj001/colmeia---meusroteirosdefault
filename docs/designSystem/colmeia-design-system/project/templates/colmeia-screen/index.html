<!-- @template name="Colmeia App Screen" description="Operational app shell — fixed sidebar, topbar breadcrumb and a content area ready to fill" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Colmeia — Nova tela</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="./ds-base.js"></script>
<style>
  html, body { margin: 0; height: 100%; }
  body { font-family: var(--font-body, system-ui); background: #fff; -webkit-font-smoothing: antialiased; }
  #root { height: 100vh; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    function mount() {
      const DS = window.ColmeiaDesignSystem_6ed06a;
      if (!DS || !DS.Sidebar) { return setTimeout(mount, 60); } // wait for async bundle load
      const { Sidebar, Topbar } = DS;

      function Screen() {
        const [collapsed, setCollapsed] = React.useState(false);
        const [route, setRoute] = React.useState("roteiros");
        const items = [
          { icon: "home", label: "Home", key: "home" },
          { icon: "pin_drop", label: "Meus roteiros", key: "roteiros" },
          { icon: "add_box", label: "Criar roteiro", key: "criar" },
          { section: "BANCO DE ATIVOS" },
          { icon: "find_in_page", label: "Dashboard", key: "ativos" },
        ].map((it) => it.section ? it : { ...it, href: "#", active: route === it.key, onClick: (e) => { e.preventDefault(); setRoute(it.key); } });

        return (
          <div style={{ display: "flex", height: "100vh", overflow: "hidden", fontFamily: "var(--font-body)" }}>
            <Sidebar
              logoSrc="../../assets/logo-colmeia-full.png"
              logoMarkSrc="../../assets/logo-colmeia-mark.png"
              items={items}
              collapsed={collapsed}
              onToggle={() => setCollapsed((c) => !c)}
            />
            <div style={{ flex: 1, display: "flex", flexDirection: "column", minWidth: 0 }}>
              <Topbar breadcrumb={[{ label: "Home", href: "#" }, { label: "Nova tela" }]} userName="Usuário" onLogout={() => {}} />
              <main style={{ flex: 1, overflow: "auto", padding: "24px" }}>
                {/* ───── Fill this content area ───── */}
                <h1 style={{ margin: 0, fontFamily: "var(--font-brand)", fontSize: 20, fontWeight: 700, color: "var(--text-strong)" }}>
                  Título da tela
                </h1>
                <p style={{ fontSize: 14, color: "var(--text-secondary)", marginTop: 6 }}>
                  Comece a montar sua tela aqui usando os componentes do design system
                  (DataTable, Card, Button, StatusBadge…).
                </p>
              </main>
            </div>
          </div>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<Screen />);
    }
    mount();
  </script>
</body>
</html>
