<!-- @dsCard group="Spacing" viewport="700x170" name="Elevation" subtitle="Subtle on cards, stronger on overlays" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--color-gray-50); }
  .wrap { padding: 26px 24px; display: flex; gap: 24px; }
  .item { text-align: center; }
  .box { width: 96px; height: 60px; background: var(--surface-card); border-radius: var(--radius-lg); }
  .lab { font-size: 11px; font-weight: 600; color: var(--text-strong); margin-top: 12px; }
  .px { font-size: 10px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><div class="lab">xs</div><div class="px">cards</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="lab">sm</div><div class="px">cards · default</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="lab">md</div><div class="px">popovers</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="lab">lg</div><div class="px">drawers</div></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-modal)"></div><div class="lab">modal</div><div class="px">dialogs</div></div>
  </div>
</body>
</html>
