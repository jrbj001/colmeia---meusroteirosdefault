<!-- @dsCard group="Colors" viewport="700x150" name="Ink & Neutral ramp" subtitle="Charcoal text + light operational greys" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); }
  .wrap { padding: 18px 20px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; }
  .chip { height: 48px; border-radius: var(--radius-md); border: 1px solid rgba(0,0,0,0.06); }
  .name { font-size: 10px; font-weight: 600; color: var(--text-strong); margin-top: 6px; }
  .hex { font-family: var(--font-mono); font-size: 9px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row">
      <div class="sw"><div class="chip" style="background:var(--color-ink-900)"></div><div class="name">ink-900</div><div class="hex">#222222</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-ink-800)"></div><div class="name">ink-800</div><div class="hex">#3A3A3A</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-ink-700)"></div><div class="name">ink-700</div><div class="hex">#393939</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-gray-600)"></div><div class="name">gray-600</div><div class="hex">#757575</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-gray-500)"></div><div class="name">gray-500</div><div class="hex">#B0B0B0</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-gray-400)"></div><div class="name">gray-400</div><div class="hex">#C1C1C1</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-gray-300)"></div><div class="name">gray-300</div><div class="hex">#D9D9D9</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-gray-200)"></div><div class="name">gray-200</div><div class="hex">#EDEDED</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-gray-100)"></div><div class="name">gray-100</div><div class="hex">#F7F7F7</div></div>
      <div class="sw"><div class="chip" style="background:var(--color-gray-50)"></div><div class="name">gray-50</div><div class="hex">#FAFAFA</div></div>
    </div>
  </div>
</body>
</html>
