<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); color: var(--text-body); }
  .foot { display: flex; justify-content: center; padding: 14px; border-top: 1px solid var(--border-subtle); }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { DataTable, Pagination, StatusBadge, IconButton, Switch } = window.ColmeiaDesignSystem_6ed06a;
    function Demo() {
      const [page, setPage] = React.useState(3);
      const [lib, setLib] = React.useState({1:true});
      const rows = [
        { id:1, nome:"Campanha Verão — São Paulo", data:"12/03/2026 14:20", status:"FINALIZADO", sem:"4 semanas" },
        { id:2, nome:"Lançamento Filial RJ", data:"10/03/2026 09:05", status:"PROCESSANDO", sem:"2 semanas" },
        { id:3, nome:"Black Friday Nacional", data:"08/03/2026 17:42", status:"EM_ANALISE", sem:"6 semanas" },
        { id:4, nome:"Institucional BH", data:"01/03/2026 11:30", status:"PARA_CORRIGIR", sem:"1 semana" },
      ];
      const cols = [
        { key:"nome", header:"Nome" },
        { key:"data", header:"Data de criação" },
        { key:"status", header:"Status", align:"center", render:(r)=> <StatusBadge status={r.status} /> },
        { key:"sem", header:"Período" },
        { key:"lib", header:"Agência", align:"center", render:(r)=> <Switch checked={!!lib[r.id]} onChange={(v)=>setLib(s=>({...s,[r.id]:v}))} /> },
        { key:"acoes", header:"", align:"right", render:(r)=> (
          <span style={{display:'inline-flex',gap:6,justifyContent:'flex-end'}}>
            <IconButton icon="pin_drop" label="Mapa" />
            <IconButton icon="difference" label="Resultados" />
            <IconButton icon="delete" tone="danger" label="Excluir" />
          </span>
        ) },
      ];
      return (
        <div>
          <DataTable columns={cols} rows={rows} rowKey={(r)=>r.id} />
          <div className="foot"><Pagination currentPage={page} totalPages={42} onPageChange={setPage} /></div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
