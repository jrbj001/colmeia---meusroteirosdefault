<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--color-gray-50); color: var(--text-body); }
  .pad { padding: 24px; }
  .grp { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 18px; }
  .lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); font-weight: 700; margin: 0 0 9px; }
  .panel { background: var(--surface-card); border: 1px solid var(--border-subtle); border-radius: var(--radius-xl); padding: 16px; }
</style>
</head>
<body>
  <div id="root" class="pad"></div>
  <script type="text/babel">
    const { Badge, StatusBadge, Spinner, Skeleton, Toast, ConfirmDialog, Button } = window.ColmeiaDesignSystem_6ed06a;
    function Demo() {
      const [open, setOpen] = React.useState(false);
      return (
        <div>
          <p className="lbl">Badges & status</p>
          <div className="grp">
            <StatusBadge status="FINALIZADO" />
            <StatusBadge status="EM_ANALISE" />
            <StatusBadge status="PARA_CORRIGIR" />
            <StatusBadge status="REJEITADO" />
            <StatusBadge status="LIBERADO" />
            <Badge tone="brand">Beta</Badge>
            <Badge tone="info" variant="outline">12 pontos</Badge>
          </div>
          <p className="lbl">Loaders</p>
          <div className="grp">
            <Spinner size={18} />
            <span style={{display:'inline-flex',alignItems:'center',gap:6,fontSize:13,color:'var(--color-warning-text)'}}><Spinner size={14} color="var(--color-warning-dot)" /> Processando</span>
            <div style={{flex:1,minWidth:200,maxWidth:280}}><Skeleton variant="text" lines={3} /></div>
            <Skeleton variant="circle" height="40px" />
          </div>
          <p className="lbl">Toast</p>
          <div className="grp">
            <Toast tone="success" title="Roteiro excluído com sucesso" message="A página foi atualizada." onClose={()=>{}} />
          </div>
          <div className="grp">
            <Button variant="danger" onClick={()=>setOpen(true)}>Abrir confirmação</Button>
          </div>
          <ConfirmDialog open={open} onClose={()=>setOpen(false)} onConfirm={()=>setOpen(false)}
            title="Confirmar Exclusão" message="Tem certeza que deseja excluir o roteiro:"
            highlight="Campanha Verão — São Paulo" confirmText="Excluir Roteiro" />
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
  </script>
</body>
</html>
