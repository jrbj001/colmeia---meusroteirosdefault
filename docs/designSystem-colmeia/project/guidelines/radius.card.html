<!-- @dsCard group="Spacing" viewport="700x160" name="Radius" subtitle="8px default · full for pills & avatars" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); }
  .wrap { padding: 22px 24px; display: flex; gap: 20px; align-items: flex-start; }
  .item { text-align: center; }
  .box { width: 72px; height: 56px; background: var(--surface-panel); border: 1.5px solid var(--color-orange-500); }
  .lab { font-size: 11px; font-weight: 600; color: var(--text-strong); margin-top: 8px; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="border-radius:var(--radius-sm)"></div><div class="lab">sm</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-md)"></div><div class="lab">md</div><div class="px">6px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-lg)"></div><div class="lab">lg · default</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-xl)"></div><div class="lab">xl</div><div class="px">12px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-2xl)"></div><div class="lab">2xl · modal</div><div class="px">16px</div></div>
    <div class="item"><div class="box" style="border-radius:var(--radius-full);width:56px"></div><div class="lab">full</div><div class="px">9999px</div></div>
  </div>
</body>
</html>
