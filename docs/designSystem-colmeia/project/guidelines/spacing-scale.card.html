<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base · Tailwind-compatible" -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-body); background: var(--surface-card); }
  .wrap { padding: 22px 24px; display: flex; align-items: flex-end; gap: 16px; }
  .item { text-align: center; }
  .bar { background: var(--color-orange-500); border-radius: 2px; width: 100%; }
  .lab { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); margin-top: 6px; }
  .px { font-size: 10px; color: var(--text-muted); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="bar" style="height:4px;width:4px"></div><div class="lab">1</div><div class="px">4</div></div>
    <div class="item"><div class="bar" style="height:8px;width:8px"></div><div class="lab">2</div><div class="px">8</div></div>
    <div class="item"><div class="bar" style="height:12px;width:12px"></div><div class="lab">3</div><div class="px">12</div></div>
    <div class="item"><div class="bar" style="height:16px;width:16px"></div><div class="lab">4</div><div class="px">16</div></div>
    <div class="item"><div class="bar" style="height:20px;width:20px"></div><div class="lab">5</div><div class="px">20</div></div>
    <div class="item"><div class="bar" style="height:24px;width:24px"></div><div class="lab">6</div><div class="px">24</div></div>
    <div class="item"><div class="bar" style="height:32px;width:32px"></div><div class="lab">8</div><div class="px">32</div></div>
    <div class="item"><div class="bar" style="height:40px;width:40px"></div><div class="lab">10</div><div class="px">40</div></div>
    <div class="item"><div class="bar" style="height:48px;width:48px"></div><div class="lab">12</div><div class="px">48</div></div>
    <div class="item"><div class="bar" style="height:64px;width:64px"></div><div class="lab">16</div><div class="px">64</div></div>
  </div>
</body>
</html>
